<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MedoChat</title>
    <link rel="stylesheet" href="../static/css/login&signup.css">
</head>

<body>

    <main class="auth-shell">
        <section class="auth-panel">

            <a class="brand" href="login.html">
                <img src="../static/images/logo.png" alt="MedoChat Logo">
                <span>MedoChat</span>
            </a>

            <h1>Create account</h1>
            <p class="subtitle">Start building your private MedoChat identity.</p>

            <div class="alerts" id="formAlerts" hidden></div>

            <form id="signupForm" method="post" action="/auth/signup">

                <input type="hidden" name="csrf_token" value="">

                <label for="displayName">Display Name</label>
                <input
                    id="displayName"
                    name="display_name"
                    type="text"
                    autocomplete="name"
                    required>

                <label for="username">Username</label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    autocomplete="username"
                    minlength="3"
                    maxlength="32"
                    required>

                <label for="email">Email</label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required>

                <label for="password">Password</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="new-password"
                    minlength="8"
                    required>

                <label for="confirmPassword">Confirm Password</label>
                <input
                    id="confirmPassword"
                    name="confirm_password"
                    type="password"
                    autocomplete="new-password"
                    minlength="8"
                    required>

                <button type="submit">
                    Create Account
                </button>

            </form>

            <p class="switch">
                Already have an account?
                <a id="loginLink" href="{{ url_for('index') }}">Login</a>
            </p>

        </section>
    </main>

    <script src="../static/js/signup.js"></script>

</body>

</html>
