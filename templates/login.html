<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MedoChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login&signup.css') }}">
</head>

<body>
    <main class="auth-shell">
        <section class="auth-panel">

            <a class="brand" href="{{ url_for('main_page') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MedoChat Logo">
                <span>MedoChat</span>
            </a>

            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to continue your conversations.</p>

            <div class="alerts" id="formAlerts">
                {% if error %}
                <p class="error-message">{{ error }}</p>
                {% endif %}
            </div>

            <!-- Added id="loginForm" -->
            <form id="loginForm" method="post" action="/auth/login">

                <input type="hidden" name="csrf_token" value="">

                <label for="email">Username or email</label>
                <input
                    id="email"
                    name="username_or_email"
                    type="text"
                    autocomplete="username"
                    value="{{ username_or_email if username_or_email else '' }}"
                    class="{% if error %}input-error{% endif %}"
                    required>

                <label for="password">Password</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    class="{% if error %}input-error{% endif %}"
                    required>

                <div class="row">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>

                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit">Login</button>

            </form>

            <p class="switch">
                New to MedoChat?
                <a id="signupLink" href="{{ url_for('signup_page') }}">Create an account</a>
            </p>

        </section>
    </main>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
